<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Productivity Website</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{ --bg:#0f172a; --card:#1e293b; --text:#fff; }
body.light{ --bg:#f1f5f9; --card:#ffffff; --text:#000; }
body{margin:0;font-family:'Segoe UI';background:var(--bg);color:var(--text)}
h1{text-align:center;padding:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;padding:20px}
.card{background:var(--card);padding:20px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
button{padding:10px;border:none;border-radius:10px;margin:5px;cursor:pointer}
.start{background:#22c55e}.pause{background:#3b82f6}.reset{background:#ef4444}
input,select{padding:8px;border-radius:8px;border:none;margin:5px}
#timer{font-size:32px}
.progress-bar{height:10px;background:#000;border-radius:10px;overflow:hidden}
.progress{height:100%;background:#22c55e;width:0%}
</style>
</head>
<body>

<h1>🚀 Study Productivity Website</h1>
<button onclick="toggleTheme()">🌙 Toggle Theme</button>

<div class="grid">

<!-- TIMER -->
<div class="card">
<h2>⏱ Pomodoro Timer</h2>
<div id="timer">25:00</div>
<button class="start" onclick="startTimer()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>
<button class="reset" onclick="resetTimer()">Reset</button>
</div>

<!-- TARGET -->
<div class="card">
<h2>🎯 Daily Target</h2>
<input id="targetInput" type="number" placeholder="Hours">
<button onclick="setTarget()">Set</button>
<p id="targetText"></p>
<div class="progress-bar"><div id="progress" class="progress"></div></div>
</div>

<!-- GRAPH -->
<div class="card">
<h2>📊 Analytics</h2>
<canvas id="chart"></canvas>
</div>

<!-- TASKS -->
<div class="card">
<h2>📝 Tasks</h2>
<input id="taskInput" placeholder="Task">
<select id="priority"><option>High</option><option>Medium</option><option>Low</option></select>
<button onclick="addTask()">Add</button>
<ul id="taskList"></ul>
</div>

<!-- REMINDER -->
<div class="card">
<h2>🔔 Study Reminder</h2>
<input type="time" id="reminder">
<button onclick="setReminder()">Set Reminder</button>
</div>

<!-- PLANNER -->
<div class="card">
<h2>📅 Study Planner</h2>
<input id="planInput" placeholder="Plan">
<button onclick="addPlan()">Add</button>
<ul id="planList"></ul>
</div>

<!-- STREAK -->
<div class="card">
<h2>🏆 Achievement & Streak</h2>
<p id="badge">No achievement</p>
<p>🔥 Streak: <span id="streak">0</span> days</p>
</div>

<!-- FOCUS MODE -->
<div class="card">
<h2>🎧 Focus Mode</h2>
<select id="musicSelect">
<option value="rain">Rain</option>
<option value="lofi">Lofi</option>
<option value="piano">Piano</option>
</select>
<button onclick="playSound()">Play</button>
<button onclick="stopSound()">Stop</button>
</div>

<!-- AI -->
<div class="card">
<h2>🤖 AI Suggestion</h2>
<p id="ai">Start studying!</p>
</div>

</div>

<script>
let time=1500,interval;
let total=JSON.parse(localStorage.getItem('total'))||0;
let target=JSON.parse(localStorage.getItem('target'))||0;
let data=JSON.parse(localStorage.getItem('data'))||[];
let streak=JSON.parse(localStorage.getItem('streak'))||0;
let lastDate=localStorage.getItem('lastDate')||null;
let audio=new Audio();audio.loop=true;

const timerEl=document.getElementById('timer');
const targetInputEl=document.getElementById('targetInput');
const targetTextEl=document.getElementById('targetText');
const progressEl=document.getElementById('progress');
const badgeEl=document.getElementById('badge');
const streakEl=document.getElementById('streak');
const taskInputEl=document.getElementById('taskInput');
const priorityEl=document.getElementById('priority');
const taskListEl=document.getElementById('taskList');
const aiEl=document.getElementById('ai');

streakEl.innerText=streak;

function updateTimer(){let m=Math.floor(time/60),s=time%60;timerEl.innerText=`${m}:${s<10?'0':''}${s}`}
function startTimer(){if(interval)return;interval=setInterval(()=>{time--;updateTimer();if(time<=0){clearInterval(interval);complete()}},1000)}
function pauseTimer(){clearInterval(interval);interval=null}
function resetTimer(){clearInterval(interval);interval=null;time=1500;updateTimer()}

function complete(){total+=0.42;save();alert('Session Complete!')}

function setTarget(){target=parseFloat(targetInputEl.value)||0;localStorage.setItem('target',target);targetTextEl.innerText='Target '+target+' hrs';updateProgress()}

function updateProgress(){if(target>0){let p=(total/target)*100;progressEl.style.width=p+'%';if(p>=100){badgeEl.innerText='🏆 Goal Achieved!'}}}

function addTask(){let t=taskInputEl.value,p=priorityEl.value;if(!t)return;let li=document.createElement('li');li.innerHTML=`${t} (${p}) <button onclick="this.parentElement.style.textDecoration='line-through'">✔</button>`;taskListEl.appendChild(li);taskInputEl.value=''}

function setReminder(){let t=document.getElementById('reminder').value;setInterval(()=>{let now=new Date().toTimeString().slice(0,5);if(now===t)alert('📚 Time to Study!')},60000)}

function addPlan(){let val=document.getElementById('planInput').value;if(!val)return;let li=document.createElement('li');li.innerText=val;document.getElementById('planList').appendChild(li)}

function playSound(){let type=document.getElementById('musicSelect').value;
if(type==='rain') audio.src='https://www.soundjay.com/nature/sounds/rain-01.mp3';
if(type==='lofi') audio.src='https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
if(type==='piano') audio.src='https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3';
audio.play();}
function stopSound(){audio.pause()}

function save(){
let today=new Date().toLocaleDateString();
if(lastDate){let prev=new Date(lastDate);let curr=new Date();let diff=(curr-prev)/(1000*60*60*24);if(Math.floor(diff)===1)streak++;else if(diff>1)streak=1}else{streak=1}
lastDate=today;
localStorage.setItem('lastDate',today);
localStorage.setItem('streak',streak);
streakEl.innerText=streak;
localStorage.setItem('total',total);
data.push({day:today,val:total});
localStorage.setItem('data',JSON.stringify(data));
updateChart();updateProgress();aiSuggest();
}

function updateChart(){new Chart(document.getElementById('chart'),{type:'line',data:{labels:data.map(x=>x.day),datasets:[{label:'Study Hours',data:data.map(x=>x.val)}]}})}

function aiSuggest(){
if(total<1) aiEl.innerText='⚠️ Study more today!';
else if(target>0 && total>=target) aiEl.innerText='🏆 Target achieved!';
else aiEl.innerText='👍 Keep going!';
}

function toggleTheme(){document.body.classList.toggle('light')}

updateTimer();updateChart();updateProgress();aiSuggest();
</script>

</body>
</html>
